name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version in manifest
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/wateralarm/manifest.json > tmp.json \
            && mv tmp.json custom_components/wateralarm/manifest.json

      - name: Create zip
        run: |
          cd custom_components
          zip -r ../wateralarm.zip wateralarm/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wateralarm.zip
